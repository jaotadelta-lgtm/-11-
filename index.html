<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบสอบหลักสูตรพราน</title>

<style>
body{
font-family:Tahoma;
background:#eef1f5;
margin:0;
}

header{
background:#1a3a6e;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

.timer{
text-align:right;
font-size:20px;
color:red;
}

.question{
margin-top:20px;
}

button{
padding:10px 20px;
font-size:16px;
background:#1a3a6e;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#132c54;
}

input{
padding:10px;
width:100%;
font-size:16px;
}
</style>
</head>

<body>

<header>ระบบสอบหลักสูตรพราน</header>

<div class="container">

<div id="login" class="card">
<h3>เข้าสอบ</h3>
<input id="email" placeholder="กรอกอีเมล">
<br><br>
<button onclick="startExam()">เริ่มสอบ</button>
<p id="msg"></p>
</div>

<div id="exam" class="card" style="display:none">
<div class="timer">
เวลา: <span id="time">20:00</span>
</div>
<div id="questions"></div>
<br>
<button onclick="submitExam()">ส่งข้อสอบ</button>
</div>

<div id="result" class="card" style="display:none">
<h2>คะแนนสอบ</h2>
<h1 id="score"></h1>
</div>

</div>

<script>

let emailUser=""
let timeLeft=1200
let timer

const questions=[

{q:"1. หน่วยพรานมีหน้าที่หลักอะไร",a:["ป้องกันประเทศ","ทำอาหาร","ขายของ","เล่นเกม"],c:0},
{q:"2. การพรางตัวมีประโยชน์อย่างไร",a:["หลบซ่อนจากศัตรู","ทำให้สวย","ทำให้อ้วน","ทำให้รวย"],c:0},
{q:"3. การเดินลาดตระเวนต้องทำอย่างไร",a:["เงียบและระวัง","วิ่งเร็ว","เปิดเพลง","ตะโกน"],c:0},
{q:"4. เข็มทิศใช้ทำอะไร",a:["บอกทิศทาง","บอกเวลา","บอกอายุ","บอกความสูง"],c:0},
{q:"5. การดูแลอาวุธควรทำอย่างไร",a:["ทำความสะอาดสม่ำเสมอ","โยนทิ้ง","แช่น้ำ","ไม่ต้องดูแล"],c:0},

{q:"6. การพรางตัวที่ดีควรทำอย่างไร",a:["ใช้สีใกล้เคียงธรรมชาติ","ใส่เสื้อสีแดง","ใส่เสื้อขาว","ใส่ไฟ"],c:0},
{q:"7. การตั้งค่ายพักควรเลือกพื้นที่แบบใด",a:["ปลอดภัยและมองเห็นรอบด้าน","กลางถนน","กลางน้ำ","ใกล้ศัตรู"],c:0},
{q:"8. การใช้อาวุธต้องคำนึงถึงอะไร",a:["ความปลอดภัย","ความสวยงาม","เสียงดัง","น้ำหนัก"],c:0},
{q:"9. การสื่อสารในสนามรบควรทำอย่างไร",a:["สั้นและชัดเจน","พูดยาว","ตะโกน","ร้องเพลง"],c:0},
{q:"10. การลาดตระเวนมีจุดประสงค์อะไร",a:["ตรวจสอบพื้นที่","นอนพัก","ทำอาหาร","เที่ยว"],c:0},

{q:"11. หากหลงทางในป่าควรทำอย่างไร",a:["ตั้งสติและหาทิศทาง","วิ่งมั่ว","นอนร้องไห้","ตะโกน"],c:0},
{q:"12. การใช้อุปกรณ์สนามต้องทำอย่างไร",a:["ใช้อย่างถูกวิธี","โยนเล่น","ทุบ","ทิ้ง"],c:0},
{q:"13. น้ำดื่มในป่าควรทำอย่างไร",a:["ต้มก่อนดื่ม","ดื่มทันที","เททิ้ง","ผสมดิน"],c:0},
{q:"14. การเฝ้ายามต้องมีอะไร",a:["ความระวัง","การนอน","การเล่น","การร้องเพลง"],c:0},
{q:"15. การฝึกพรานมีจุดประสงค์อะไร",a:["เพิ่มความสามารถ","เพื่อเล่น","เพื่อเที่ยว","เพื่อขายของ"],c:0},

{q:"16. อุปกรณ์สำคัญในการเอาชีวิตรอดคืออะไร",a:["มีด","โทรทัศน์","ลำโพง","โซฟา"],c:0},
{q:"17. การพรางตัวตอนกลางคืนควรทำอย่างไร",a:["ลดเสียงและแสง","เปิดไฟ","ตะโกน","วิ่ง"],c:0},
{q:"18. หากพบศัตรูควรทำอย่างไร",a:["รายงานผู้บังคับบัญชา","วิ่งเล่น","นอน","ถ่ายรูป"],c:0},
{q:"19. การเดินในป่าควรทำอย่างไร",a:["ดูทางและระวัง","วิ่งเร็ว","หลับตาเดิน","กระโดด"],c:0},
{q:"20. การทำงานเป็นทีมสำคัญอย่างไร",a:["ช่วยให้ภารกิจสำเร็จ","ไม่สำคัญ","ทำให้ช้า","ทำให้แพ้"],c:0},

{q:"21. การใช้เข็มทิศต้องทำอย่างไร",a:["อ่านทิศเหนือ","โยน","ปิดตา","หมุนเล่น"],c:0},
{q:"22. การตั้งฐานปฏิบัติการต้องคำนึงถึงอะไร",a:["ความปลอดภัย","ความสวย","เสียงดัง","สี"],c:0},
{q:"23. การสังเกตร่องรอยศัตรูต้องทำอย่างไร",a:["ดูรอยเท้า","นอน","ร้องเพลง","วิ่ง"],c:0},
{q:"24. การพกอาวุธต้องทำอย่างไร",a:["ปลอดภัย","โยน","หมุน","ทุบ"],c:0},
{q:"25. การพรางตัวที่ดีคืออะไร",a:["กลมกลืนธรรมชาติ","สีสด","ไฟสว่าง","เสียงดัง"],c:0},

{q:"26. หากเกิดอันตรายต้องทำอย่างไร",a:["รายงานทันที","หนีเล่น","นอน","หัวเราะ"],c:0},
{q:"27. การใช้อุปกรณ์สื่อสารต้องทำอย่างไร",a:["ชัดเจน","มั่ว","เสียงดัง","ร้องเพลง"],c:0},
{q:"28. การฝึกระเบียบวินัยสำคัญอย่างไร",a:["ทำให้หน่วยแข็งแกร่ง","ไม่สำคัญ","ทำให้ช้า","ทำให้แพ้"],c:0},
{q:"29. การเดินทางไกลต้องเตรียมอะไร",a:["เสบียง","ลำโพง","ทีวี","โซฟา"],c:0},
{q:"30. หน่วยพรานต้องมีคุณสมบัติอะไร",a:["ความกล้าหาญ","ขี้เกียจ","กลัว","นอน"],c:0}

]

function startExam(){

let email=document.getElementById("email").value
emailUser=email

document.getElementById("login").style.display="none"
document.getElementById("exam").style.display="block"

loadQuestions()
startTimer()

}

function loadQuestions(){

let html=""

questions.forEach((q,i)=>{

html+=`<div class="question"><p>${q.q}</p>`

q.a.forEach((ans,index)=>{

html+=`
<label>
<input type="radio" name="q${i}" value="${index}">
${ans}
</label><br>
`

})

html+="</div>"

})

document.getElementById("questions").innerHTML=html

}

function startTimer(){

timer=setInterval(()=>{

timeLeft--

let min=Math.floor(timeLeft/60)
let sec=timeLeft%60

document.getElementById("time").innerText=
min+":"+(sec<10?"0":"")+sec

if(timeLeft<=0){
submitExam()
}

},1000)

}

function submitExam(){

clearInterval(timer)

let score=0

questions.forEach((q,i)=>{

let ans=document.querySelector(`input[name=q${i}]:checked`)

if(ans && ans.value==q.c){
score++
}

})

document.getElementById("exam").style.display="none"
document.getElementById("result").style.display="block"

document.getElementById("score").innerText=score+" / 30"

}

document.addEventListener("visibilitychange",function(){

if(document.hidden){
alert("ออกจากหน้าจอสอบ = ตัดสิทธิ์")
location.reload()
}

})

document.addEventListener("contextmenu",e=>e.preventDefault())

</script>

</body>
</html>
